name: macOS Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/macos-release.yml"
      - "PowerEditor/macos/**"
      - "PowerEditor/src/langs.model.xml"
      - "lexilla/**"
      - "scintilla/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/macos-release.yml"
      - "PowerEditor/macos/**"
      - "PowerEditor/src/langs.model.xml"
      - "lexilla/**"
      - "scintilla/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "可选：填写 v1.0.0 形式的标签以创建 Release"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build Universal macOS app
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Set release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag || '' }}" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag=""
          fi

          if [[ -n "${release_tag}" ]]; then
            if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release tag: ${release_tag}" >&2
              exit 1
            fi
            version="${release_tag#v}"
            package_version="${version}"
          else
            version="1.0.0"
            package_version="snapshot-${GITHUB_RUN_NUMBER}"
          fi

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${version}" PowerEditor/macos/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" PowerEditor/macos/Resources/Info.plist
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        working-directory: PowerEditor/macos
        run: make test

      - name: Build app
        working-directory: PowerEditor/macos
        run: make app

      - name: Verify Universal binaries and signature
        shell: bash
        run: |
          set -euo pipefail
          app="PowerEditor/macos/build/Notepad++Mac.app"
          codesign --verify --deep --strict --verbose=2 "${app}"
          test "$(lipo -archs "${app}/Contents/MacOS/Notepad++Mac")" = "x86_64 arm64" || \
            test "$(lipo -archs "${app}/Contents/MacOS/Notepad++Mac")" = "arm64 x86_64"
          test "$(lipo -archs "${app}/Contents/Frameworks/liblexilla.dylib")" = "x86_64 arm64" || \
            test "$(lipo -archs "${app}/Contents/Frameworks/liblexilla.dylib")" = "arm64 x86_64"

      - name: Package ZIP and DMG
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.package_version }}"
          dist="PowerEditor/macos/build/dist"
          app="PowerEditor/macos/build/Notepad++Mac.app"
          zip_name="Notepad++Mac-${version}-universal.zip"
          dmg_name="Notepad++Mac-${version}-universal.dmg"
          rm -rf "${dist}"
          mkdir -p "${dist}/dmg"
          ditto -c -k --sequesterRsrc --keepParent "${app}" "${dist}/${zip_name}"
          ditto "${app}" "${dist}/dmg/Notepad++Mac.app"
          ln -s /Applications "${dist}/dmg/Applications"
          hdiutil create -volname "Notepad++Mac ${version}" -srcfolder "${dist}/dmg" \
            -ov -format UDZO "${dist}/${dmg_name}"
          rm -rf "${dist}/dmg"
          cd "${dist}"
          shasum -a 256 "${zip_name}" "${dmg_name}" > SHA256SUMS.txt
          echo "dist=${dist}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Notepad++Mac-${{ steps.version.outputs.package_version }}-universal
          path: |
            PowerEditor/macos/build/dist/*.zip
            PowerEditor/macos/build/dist/*.dmg
            PowerEditor/macos/build/dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || steps.version.outputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: Notepad++Mac ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            PowerEditor/macos/build/dist/*.zip
            PowerEditor/macos/build/dist/*.dmg
            PowerEditor/macos/build/dist/SHA256SUMS.txt
